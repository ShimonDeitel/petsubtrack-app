name: Petsubtrack
options:
  bundleIdPrefix: com.shimondeitel.petsubtrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Petsubtrack:
    type: application
    platform: iOS
    sources:
      - path: Petsubtrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petsubtrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Petsubtrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PetsubtrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetsubtrackTests
      - path: Petsubtrack.storekit
    dependencies:
      - target: Petsubtrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petsubtrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PetsubtrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetsubtrackUITests
    dependencies:
      - target: Petsubtrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petsubtrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Petsubtrack:
    build:
      targets:
        Petsubtrack: all
        PetsubtrackTests: [test]
        PetsubtrackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Petsubtrack.storekit
    test:
      config: Debug
      storeKitConfiguration: Petsubtrack.storekit
      targets:
        - PetsubtrackTests
        - PetsubtrackUITests
    archive:
      config: Release
